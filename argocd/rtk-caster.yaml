apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rtk-caster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:dwilson2547/cluster_config.git
    targetRevision: main
    path: rtk-caster
  destination:
    server: https://kubernetes.default.svc
    namespace: rtk-caster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
