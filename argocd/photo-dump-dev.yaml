apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: photo-dump-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:dwilson2547/photo_dump.git
    targetRevision: dev
    path: helm/photo-dump
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: photo-dump-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
