apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: danwiki-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dwilson2547/DanWiki.git
    targetRevision: dev
    path: helm/danwiki
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: danwiki-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
