apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gyopart
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dwilson2547/gyopart.git
    targetRevision: main
    path: helm/gyopart
  destination:
    server: https://kubernetes.default.svc
    namespace: gyopart
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
