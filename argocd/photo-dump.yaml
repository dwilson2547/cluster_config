apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: photo-dump
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:dwilson2547/photo_dump.git
    targetRevision: main
    path: helm/photo-dump
  destination:
    server: https://kubernetes.default.svc
    namespace: photo-dump
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
