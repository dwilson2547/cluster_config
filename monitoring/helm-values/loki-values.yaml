# helm repo add grafana-community https://grafana-community.github.io/helm-charts
# helm repo update
# helm install loki grafana-community/loki --namespace monitoring -f loki-values.yaml

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  persistence:
    storageClass: nfs-dataset
    size: 50Gi

# Disable microservice components (not needed in SingleBinary mode)
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable self-monitoring to avoid grafana-agent operator dependency
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

lokiCanary:
  enabled: false

test:
  enabled: false

# microk8s self-signed CA lacks Key Usage extension — Python SSL rejects it
sidecar:
  skipTlsVerify: true
