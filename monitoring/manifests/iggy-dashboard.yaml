          "options": {
            "content": "### Current limitation\nIggy's `/metrics` endpoint in this cluster exposes **broker-wide** metrics only (`messages`, `clients`, `topics`, `partitions`, etc.). It does **not** expose per-topic Prometheus series or labels, so Grafana cannot show true topic-by-topic flow from the broker scrape alone.\n\nThis dashboard gives you a reliable broker-level flow view for validating whether the ESP32 is still feeding Iggy. If you want per-topic flow later, the straightforward next step is adding an app-side/exporter metric that counts publishes by topic.",
