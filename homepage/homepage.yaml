apiVersion: v1
kind: Namespace
metadata:
  name: homepage
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
secrets:
  - name: homepage
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
  annotations:
    kubernetes.io/service-account.name: homepage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
rules:
  - apiGroups: [""]
    resources: [namespaces, pods, nodes]
    verbs: [get, list]
  - apiGroups: [extensions, networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list]
  - apiGroups: [traefik.io]
    resources: [ingressroutes]
    verbs: [get, list]
  - apiGroups: [metrics.k8s.io]
    resources: [nodes, pods]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage
subjects:
  - kind: ServiceAccount
    name: homepage
    namespace: homepage
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster

  settings.yaml: |
    title: Home
    theme: dark
    color: slate
    headerStyle: clean
    layout:
      Gyopart:
        style: row
        columns: 3
      Gyopart Dev:
        style: row
        columns: 3
      Scrape Stack:
        style: row
        columns: 3
      Scrape Stack Dev:
        style: row
        columns: 3
      AI Services:
        style: row
        columns: 2
      Cluster:
        style: row
        columns: 3
      Infrastructure:
        style: row
        columns: 4

  bookmarks.yaml: |
    - GitHub:
        - gyopart:
            - href: https://github.com/dwilson2547/gyopart
              abbr: GP
        - cluster_config:
            - href: https://github.com/dwilson2547/cluster_config
              abbr: CC
        - All Repos:
            - href: https://github.com/dwilson2547?tab=repositories
              abbr: GH
    - Registries:
        - Docker Hub:
            - href: https://hub.docker.com/repositories/dwilson2547
              abbr: DH
        - PyPI:
            - href: https://pypi.org/user/dwilson2547/
              abbr: PY

  services.yaml: |
    - Gyopart:
        - UI:
            href: http://gyopart.local
            description: Gyopart customer-facing app
            icon: si-react
        - API:
            href: http://api.gyopart.local/docs
            description: Parts interchange API (Swagger)
            icon: si-fastapi
        - Admin:
            href: http://admin.gyopart.local
            description: Junkyard mapping & discrepancy review
            icon: si-python

    - Gyopart Dev:
        - UI (dev):
            href: http://gyopart-dev.local
            description: Gyopart dev environment
            icon: si-react
        - API (dev):
            href: http://api.gyopart-dev.local/docs
            description: Parts interchange API — dev
            icon: si-fastapi
        - Admin (dev):
            href: http://admin.gyopart-dev.local
            description: Admin UI — dev
            icon: si-python

    - Scrape Stack:
        - Cache Browser:
            href: http://cache-browser.scrapestack.local
            description: Browse and inspect cached content
            icon: si-googlechrome
        - Auth:
            href: http://auth.scrapestack.local
            description: Request auth key management
            icon: si-webauthn
        - Webcache API:
            href: http://webcache.scrapestack.local/docs
            description: Web page cache service
            icon: si-fastapi
        - Imgcache API:
            href: http://imgcache.scrapestack.local/docs
            description: Image cache service
            icon: si-fastapi
        - Vidcache API:
            href: http://vidcache.scrapestack.local/docs
            description: Video cache service
            icon: si-fastapi
        - Filecache API:
            href: http://filecache.scrapestack.local/docs
            description: File cache service
            icon: si-fastapi

    - Scrape Stack Dev:
        - Cache Browser (dev):
            href: http://cache-browser.scrapestack-dev.local
            description: Browse and inspect cached content — dev
            icon: si-googlechrome
        - Auth (dev):
            href: http://auth.scrapestack-dev.local
            description: Request auth key management — dev
            icon: si-webauthn
        - Webcache API (dev):
            href: http://webcache.scrapestack-dev.local/docs
            description: Web page cache service — dev
            icon: si-fastapi
        - Imgcache API (dev):
            href: http://imgcache.scrapestack-dev.local/docs
            description: Image cache service — dev
            icon: si-fastapi
        - Vidcache API (dev):
            href: http://vidcache.scrapestack-dev.local/docs
            description: Video cache service — dev
            icon: si-fastapi
        - Filecache API (dev):
            href: http://filecache.scrapestack-dev.local/docs
            description: File cache service — dev
            icon: si-fastapi

    - AI Services:
        - AI Notes:
            href: http://notes.ai-services.local
            description: Persistent agent knowledge base
            icon: si-markdown
        - AI Playbooks:
            href: http://playbooks.ai-services.local
            description: Agent skill playbooks
            icon: si-bookstack
        - AI Tool Docs:
            href: http://docs.ai-services.local
