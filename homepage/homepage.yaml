            icon: si-readthedocs

    - Cluster:
        - ArgoCD:
            href: http://argocd.local
            description: GitOps continuous delivery
            icon: argocd
        - Grafana:
            href: http://monitoring.local
            description: Metrics and dashboards
            icon: grafana
        - SearXNG:
