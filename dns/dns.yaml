apiVersion: v1
kind: Namespace
metadata:
  name: dns
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-local-config
  namespace: dns
data:
  Corefile: |
    scrapestack.local:53 {
        file /etc/coredns/db.scrapestack.local
        log
        errors
    }

    monitoring.local:53 {
        file /etc/coredns/db.monitoring.local
        log
        errors
    }

    scrapestack-dev.local:53 {
        file /etc/coredns/db.scrapestack-dev.local
        log
        errors
    }

    argocd.local:53 {
        file /etc/coredns/db.argocd.local
        log
        errors
    }

    ai-services.local:53 {
        file /etc/coredns/db.ai-services.local
        log
        errors
    }

    gyopart-dev.local:53 {
        file /etc/coredns/db.gyopart-dev.local
        log
        errors
    }

    gyopart.local:53 {
        file /etc/coredns/db.gyopart.local
        log
        errors
    }

    robo-services.local:53 {
        file /etc/coredns/db.robo-services.local
        log
        errors
    }

    pub-sub.local:53 {
        file /etc/coredns/db.pub-sub.local
        log
        errors
    }

    cluster.local:53 {
        file /etc/coredns/db.cluster.local
        log
        errors
    }

    .:53 {
        forward . 8.8.8.8 1.1.1.1
        cache 30
        log
        errors
        health :8080
        ready :8181
    }

  db.scrapestack.local: |
    $ORIGIN scrapestack.local.
    $TTL 300

    @   IN  SOA  ns1.scrapestack.local. admin.scrapestack.local. (
                    2026051002 ; serial
                    3600       ; refresh
                    900        ; retry
                    86400      ; expire
                    300        ; minimum TTL
                 )

    @   IN  NS   ns1.scrapestack.local.
    ns1 IN  A    192.168.0.61

    ; All subdomains → Traefik ingress controller
    @   IN  A    192.168.0.60
    *   IN  A    192.168.0.60

    ; gRPC LoadBalancer — explicit record overrides the wildcard
    request-auth-server  IN  A  192.168.0.62

  db.monitoring.local: |
    $ORIGIN monitoring.local.
    $TTL 300

    @   IN  SOA  ns1.scrapestack.local. admin.scrapestack.local. (
                    2026052402 ; serial
                    3600       ; refresh
                    900        ; retry
                    86400      ; expire
                    300        ; minimum TTL
                 )

    @   IN  NS   ns1.scrapestack.local.

    ; All subdomains → Traefik ingress controller
    @   IN  A    192.168.0.60
    *   IN  A    192.168.0.60

  db.scrapestack-dev.local: |
    $ORIGIN scrapestack-dev.local.
    $TTL 300

    @   IN  SOA  ns1.scrapestack.local. admin.scrapestack.local. (
                    2026052101 ; serial
                    3600       ; refresh
                    900        ; retry
                    86400      ; expire
                    300        ; minimum TTL
                 )

    @   IN  NS   ns1.scrapestack.local.

    ; All subdomains → Traefik ingress controller
    @   IN  A    192.168.0.60
    *   IN  A    192.168.0.60

    ; dev gRPC LoadBalancer — explicit record overrides the wildcard
    request-auth-server  IN  A  192.168.0.63

  db.argocd.local: |
    $ORIGIN argocd.local.
    $TTL 300

    @   IN  SOA  ns1.scrapestack.local. admin.scrapestack.local. (
                    2026052201 ; serial
                    3600       ; refresh
                    900        ; retry
                    86400      ; expire
                    300        ; minimum TTL
                 )

    @   IN  NS   ns1.scrapestack.local.

    ; Apex → Traefik ingress controller
    @   IN  A    192.168.0.60

  db.ai-services.local: |
    $ORIGIN ai-services.local.
    $TTL 300

    @   IN  SOA  ns1.scrapestack.local. admin.scrapestack.local. (
                    2026052501 ; serial
                    3600       ; refresh
                    900        ; retry
                    86400      ; expire
                    300        ; minimum TTL
                 )

    @   IN  NS   ns1.scrapestack.local.

    ; Subdomains → Traefik ingress controller
    notes      IN  A    192.168.0.60
    context-store  IN  A    192.168.0.60
    docs       IN  A    192.168.0.60
    todo       IN  A    192.168.0.60

  db.gyopart-dev.local: |
    $ORIGIN gyopart-dev.local.
    $TTL 300

    @   IN  SOA  ns1.scrapestack.local. admin.scrapestack.local. (
                    2026052401 ; serial
                    3600       ; refresh
                    900        ; retry
                    86400      ; expire
                    300        ; minimum TTL
                 )

    @   IN  NS   ns1.scrapestack.local.

    ; All subdomains → Traefik ingress controller
    @   IN  A    192.168.0.60
    *   IN  A    192.168.0.60

  db.gyopart.local: |
    $ORIGIN gyopart.local.
    $TTL 300

    @   IN  SOA  ns1.scrapestack.local. admin.scrapestack.local. (
                    2026052401 ; serial
                    3600       ; refresh
                    900        ; retry
                    86400      ; expire
                    300        ; minimum TTL
                 )

    @   IN  NS   ns1.scrapestack.local.

    ; All subdomains → Traefik ingress controller
    @   IN  A    192.168.0.60
    *   IN  A    192.168.0.60

  db.robo-services.local: |
    $ORIGIN robo-services.local.
    $TTL 300

    @   IN  SOA  ns1.robo-services.local. admin.robo-services.local. (
                    2026052501 ; serial
                    3600       ; refresh
                    900        ; retry
                    86400      ; expire
                    300        ; minimum TTL
                 )

    @   IN  NS   ns1.robo-services.local.
    ns1 IN  A    192.168.0.61

    ; UDP receiver LoadBalancer
    kreceiver IN A 192.168.0.70

  db.pub-sub.local: |
    $ORIGIN pub-sub.local.
    $TTL 300

    @   IN  SOA  ns1.pub-sub.local. admin.pub-sub.local. (
                    2026052501 ; serial
                    3600       ; refresh
                    900        ; retry
                    86400      ; expire
                    300        ; minimum TTL
                 )

    @   IN  NS   ns1.pub-sub.local.
    ns1 IN  A    192.168.0.61

    ; Pub-sub hosts → Traefik ingress controller
    @         IN  A    192.168.0.60
    *         IN  A    192.168.0.60

  db.cluster.local: |
    $ORIGIN cluster.local.
    $TTL 300

    @   IN  SOA  ns1.scrapestack.local. admin.scrapestack.local. (
                    2026052401 ; serial
                    3600       ; refresh
                    900        ; retry
                    86400      ; expire
                    300        ; minimum TTL
                 )

    @   IN  NS   ns1.scrapestack.local.

    ; All subdomains → Traefik ingress controller
    @   IN  A    192.168.0.60
    *   IN  A    192.168.0.60

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coredns-local
  namespace: dns
  annotations:
    configmap.reloader.stakater.com/reload: "coredns-local-config"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coredns-local
  template:
    metadata:
      labels:
        app: coredns-local
    spec:
      containers:
        - name: coredns
          image: coredns/coredns:latest
          imagePullPolicy: Always
          args: ["-conf", "/etc/coredns/Corefile"]
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/coredns
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: 8181
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: coredns-local-config
---
apiVersion: v1
kind: Service
metadata:
  name: coredns-local
  namespace: dns
  annotations:
    # Pin to a stable IP so the zone file NS record and your router config stay in sync
    metallb.universe.tf/loadBalancerIPs: 192.168.0.61
spec:
  type: LoadBalancer
  selector:
    app: coredns-local
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
