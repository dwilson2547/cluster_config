      - image: dwilson2547/ai-tool-docs-ui:latest
        imagePullPolicy: Always
        name: ai-tool-docs-ui
        ports:
        - containerPort: 80
          name: web
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
