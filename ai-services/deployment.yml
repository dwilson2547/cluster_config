metadata:
  name: ai-tool-docs-api
  namespace: ai-services
spec:
  type: ClusterIP
  selector:
    app: ai-tool-docs-api
  ports:
  - port: 8002
    targetPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: ai-tool-docs-ui
  namespace: ai-services
spec:
  type: ClusterIP
  selector:
    app: ai-tool-docs-ui
  ports:
