apiVersion: v1
kind: Namespace
metadata:
  name: ai-services
  labels:
    name: ai-services
---
# ── ai-notes ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-ai-notes
  namespace: ai-services
spec:
  storageClassName: nfs-dataset
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-notes-api
  namespace: ai-services
spec:
  selector:
    matchLabels:
      app: ai-notes-api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ai-notes-api
    spec:
      containers:
      - image: dwilson2547/ai-notes-api:latest
        name: ai-notes-api
        ports:
        - containerPort: 8000
          name: api
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: pvc-ai-notes
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-notes-ui
  namespace: ai-services
spec:
  selector:
    matchLabels:
      app: ai-notes-ui
  template:
    metadata:
      labels:
        app: ai-notes-ui
    spec:
      containers:
      - image: dwilson2547/ai-notes-ui:latest
        name: ai-notes-ui
        ports:
        - containerPort: 80
          name: web
---
apiVersion: v1
kind: Service
metadata:
  name: ai-notes-api
  namespace: ai-services
spec:
  type: ClusterIP
  selector:
    app: ai-notes-api
  ports:
  - port: 8000
    targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-notes-ui
  namespace: ai-services
spec:
  type: ClusterIP
  selector:
    app: ai-notes-ui
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-ai-notes
  namespace: ai-services
spec:
  ingressClassName: nginx
  rules:
  - host: notes.ai-services.local
    http:
      paths:
      - path: /api/
        pathType: Prefix
        backend:
          service:
            name: ai-notes-api
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-notes-ui
            port:
              number: 80
---
