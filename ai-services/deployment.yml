# ── ai-tool-docs ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-tool-docs-ui-nginx
  namespace: ai-services
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-ai-tool-docs
  namespace: ai-services
spec:
  storageClassName: nfs-dataset
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 3Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-tool-docs-api
  namespace: ai-services
spec:
  selector:
    matchLabels:
      app: ai-tool-docs-api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ai-tool-docs-api
    spec:
      containers:
      - image: dwilson2547/ai-tool-docs-api:latest
        imagePullPolicy: Always
        name: ai-tool-docs-api
        ports:
        - containerPort: 8002
          name: api
        envFrom:
        - secretRef:
            name: ai-tool-docs-secret
            optional: true
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: pvc-ai-tool-docs
---
apiVersion: apps/v1
