apiVersion: v1
kind: Namespace
metadata:
  name: mongodb-custom
  labels:
    name: mongodb-custom
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-custom-pvc
  namespace: mongodb-custom
spec:
  storageClassName: nfs-crucial
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-custom-app
  namespace: mongodb-custom
spec:
  selector:
    matchLabels:
      app: mongodb-custom-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mongodb-custom-app
    spec:
      securityContext:
        fsGroup: 100
      containers:
      - image: mongo
        name: mongodb
        securityContext:
          runAsUser: 4000
          runAsGroup: 100
          allowPrivilegeEscalation: false
        env:
          # Use secret in real usage
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-custom-creds
              key: rootUsername
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-custom-creds
              key: rootPassword
        - name: MONGO_INITDB_DATABASE
          valueFrom:
            secretKeyRef:
              name: mongodb-custom-creds
              key: database
        ports:
        - containerPort: 27017
          name: mongodb
        volumeMounts:
        - name: mongodb-persistent-storage
          mountPath: /data/db
      volumes:
      - name: mongodb-persistent-storage
        persistentVolumeClaim:
          claimName: mongodb-custom-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-custom-svc
  namespace: mongodb-custom
spec:
  type: NodePort
  selector:
    app: mongodb-custom-app
  ports:
  - port: 27017
    targetPort: 27017
    nodePort: 31717
    protocol: TCP