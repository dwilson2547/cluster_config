---
apiVersion: v1
kind: Namespace
metadata:
  name: immich
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: immich-media
  namespace: immich
  labels:
    app.name: immich
  annotations:
spec:
  storageClassName: nfs-crucial
  accessModes:
    - "ReadWriteOnce"
  resources:
    requests:
      storage: "100Gi"
---