apiVersion: v1
kind: Namespace
metadata:
  name: pub-sub
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: iggy-config
  namespace: pub-sub
data:
  IGGY_ROOT_USERNAME: "iggy"
  IGGY_HTTP_ENABLED: "true"
  IGGY_HTTP_ADDRESS: "0.0.0.0:3000"
  IGGY_HTTP_CORS_ENABLED: "true"
  IGGY_HTTP_CORS_ALLOWED_ORIGINS_0: "http://iggy-web.pub-sub.local"
  IGGY_TCP_ADDRESS: "0.0.0.0:8090"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iggy-data
  namespace: pub-sub
spec:
  storageClassName: nfs-dataset
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iggy
  namespace: pub-sub
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: iggy
  template:
    metadata:
      labels:
        app: iggy
    spec:
      containers:
        - name: iggy
          image: apache/iggy:0.8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: IGGY_ROOT_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: iggy-config
                  key: IGGY_ROOT_USERNAME
            - name: IGGY_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iggy-secret
                  key: IGGY_ROOT_PASSWORD
            - name: IGGY_HTTP_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: iggy-config
                  key: IGGY_HTTP_ENABLED
            - name: IGGY_HTTP_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: iggy-config
                  key: IGGY_HTTP_ADDRESS
            - name: IGGY_HTTP_CORS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: iggy-config
                  key: IGGY_HTTP_CORS_ENABLED
            - name: IGGY_HTTP_CORS_ALLOWED_ORIGINS_0
              valueFrom:
                configMapKeyRef:
                  name: iggy-config
                  key: IGGY_HTTP_CORS_ALLOWED_ORIGINS_0
            - name: IGGY_TCP_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: iggy-config
                  key: IGGY_TCP_ADDRESS
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: tcp
              containerPort: 8090
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - >
                  iggy --transport tcp
                  --tcp-server-address 127.0.0.1:8090
                  --credentials-username "$IGGY_ROOT_USERNAME"
                  --credentials-password "$IGGY_ROOT_PASSWORD"
                  ping >/dev/null 2>&1
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - >
                  iggy --transport tcp
                  --tcp-server-address 127.0.0.1:8090
                  --credentials-username "$IGGY_ROOT_USERNAME"
                  --credentials-password "$IGGY_ROOT_PASSWORD"
                  ping >/dev/null 2>&1
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: iggy-data
              mountPath: /local_data
          securityContext:
            capabilities:
              add:
                - SYS_NICE
      volumes:
        - name: iggy-data
          persistentVolumeClaim:
            claimName: iggy-data
---
apiVersion: v1
kind: Service
metadata:
  name: iggy
  namespace: pub-sub
  labels:
    app: iggy
spec:
  selector:
    app: iggy
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
    - name: tcp
      port: 8090
      targetPort: 8090
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iggy-web-ui
  namespace: pub-sub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iggy-web-ui
  template:
    metadata:
      labels:
        app: iggy-web-ui
    spec:
      containers:
        - name: iggy-web-ui
          image: apache/iggy-web-ui:0.3.0
          imagePullPolicy: IfNotPresent
          env:
            - name: PUBLIC_IGGY_API_URL
              value: http://iggy.pub-sub.local
          ports:
            - name: http
              containerPort: 3050
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /auth/sign-in
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /auth/sign-in
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: iggy-web-ui
  namespace: pub-sub
spec:
  selector:
    app: iggy-web-ui
  ports:
    - name: http
      port: 3050
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iggy
  namespace: pub-sub
spec:
  ingressClassName: nginx
  rules:
    - host: iggy.pub-sub.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iggy
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iggy-web-ui
  namespace: pub-sub
spec:
  ingressClassName: nginx
  rules:
    - host: iggy-web.pub-sub.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iggy-web-ui
                port:
                  number: 3050
