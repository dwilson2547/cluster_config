apiVersion: v1
kind: Namespace
metadata:
  name: vpn
  labels:
    name: vpn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nordvpn-proxy
  namespace: vpn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nordvpn-proxy
  template:
    metadata:
      labels:
        app: nordvpn-proxy
    spec:
      containers:
        - name: nordvpn-proxy
          image: dwilson2547/nordvpn-proxy
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          ports:
            - containerPort: 8118
              name: proxy-server
          env:
            - name: LOCAL_NETWORK
              value: 192.168.0.0/24
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: vpn-creds
                  key: username
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vpn-creds
                  key: password
          volumeMounts:
            - name: tz-config
              mountPath: /etc/localtime
              readOnly: true
          # livenessProbe:
          #   exec:
          #     command:
          #       - /bin/sh
          #       - -c
          #       - if [[ $( curl -x localhost:8118 https://api.nordvpn.com/vpn/check/full | jq -r '.["status"]' ) = "Protected" ]] ; then exit 0; else exit 1; fi
          #   initialDelaySeconds: 60
          #   periodSeconds: 60
          #   timeoutSeconds: 10
      dnsConfig:
        nameservers:
          - 103.86.96.100
          - 103.86.99.100
      volumes:
        - name: tz-config
          hostPath:
            path: /usr/share/zoneinfo/Etc/UTC
---
apiVersion: v1
kind: Service
metadata:
  name: nordvpn-proxy-entrypoint
  namespace: vpn
spec:
  type: NodePort
  selector:
    app: nordvpn-proxy
  ports:
    - port: 8118
      targetPort: 8118
      nodePort: 30008